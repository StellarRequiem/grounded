name: verify

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -q
      # Smoke-test the CLI entrypoint actually loads + runs (the gate exercises the tool, not just imports).
      - name: CLI smoke test
        run: grounded --help
